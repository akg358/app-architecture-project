<!DOCTYPE html>
<html>
<head>
    <title>notes app</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        input, button { padding: 10px; margin: 5px; }
        ul { list-style: none; padding: 0; }
        li { background: #f0f0f0; margin: 10px 0; padding: 10px; display: flex; justify-content: space-between; }
        .delete { background: red; color: white; border: none; padding: 5px 10px; cursor: pointer; }
        .user-box { background: #d4edda; padding: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>notes app</h1>

    <div class="user-box">
        user: 
        <select id="userSelect">
            <option value="1">user 1</option>
        </select>
        <button onclick="addUser()">new user</button>
    </div>

    <input id="noteInput" placeholder="write a note">
    <button onclick="addNote()">add note</button>

    <ul id="notesList"></ul>

    <script>
        const GATEWAY = 'http://localhost:8080/api';
        let currentUserId = 1;

        // get all users
        async function loadUsers() {
            try {
                const res = await fetch(`${GATEWAY}/users`);
                const users = await res.json();
                const select = document.getElementById('userSelect');
                select.innerHTML = '';
                users.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.id;
                    option.textContent = user.username;
                    select.appendChild(option);
                });
                if (users.length > 0) currentUserId = users[0].id;
                loadNotes();
            } catch(err) {
                console.log('no users yet');
            }
        }

        // create new user
        async function addUser() {
            const username = prompt('username:');
            const email = prompt('email:');
            if (!username || !email) return;
            await fetch(`${GATEWAY}/users`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email })
            });
            loadUsers();
        }

        // get notes
        async function loadNotes() {
            const res = await fetch(`${GATEWAY}/notes?user_id=${currentUserId}`);
            const notes = await res.json();
            const list = document.getElementById('notesList');
            list.innerHTML = '';
            notes.forEach(note => {
                const item = document.createElement('li');
                item.innerHTML = note.content + ' <button class="delete" onclick="deleteNote(' + note.id + ')">delete</button>';
                list.appendChild(item);
            });
        }

        // add note
        async function addNote() {
            const text = document.getElementById('noteInput').value;
            if (!text.trim()) return;
            await fetch(`${GATEWAY}/notes`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: text, user_id: currentUserId })
            });
            document.getElementById('noteInput').value = '';
            loadNotes();
        }

        // delete note
        async function deleteNote(id) {
            await fetch(`${GATEWAY}/notes/${id}`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: currentUserId })
            });
            loadNotes();
        }

        // switch user
        document.getElementById('userSelect').addEventListener('change', (e) => {
            currentUserId = parseInt(e.target.value);
            loadNotes();
        });

        loadUsers();
    </script>

</body>
</html>
